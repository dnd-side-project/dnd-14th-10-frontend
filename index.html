<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dnd-14th-10-frontend</title>
    <script>
      window.__naverMapReady = false;
      window.__naverMapCallbacks = [];
      window.__onNaverMapLoaded = function () {
        window.__naverMapReady = true;
        window.__naverMapCallbacks.forEach(function (cb) { cb(); });
        window.__naverMapCallbacks = [];
      };
    </script>
    <script
      async
      src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=%VITE_NAVER_CLIENT_ID%&submodules=geocoder&callback=__onNaverMapLoaded"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
